apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-performance-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-performance-platform

  template:
    metadata:
      labels:
        app: ai-performance-platform

    spec:
      containers:
      - name: ai-performance-platform
        image: sigh1234/ai-performance-platform:1.0
        imagePullPolicy: Always